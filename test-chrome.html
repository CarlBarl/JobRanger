<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chrome Integration Test</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 600px; margin: 50px auto; padding: 20px; }
    h1 { color: #333; }
    button { padding: 10px 20px; font-size: 16px; cursor: pointer; margin: 5px; }
    #output { margin-top: 20px; padding: 15px; background: #f5f5f5; border-radius: 8px; min-height: 50px; }
    .success { color: green; }
    .error { color: red; }
  </style>
</head>
<body>
  <h1>Chrome Integration Test</h1>
  <p>This page tests if Claude Code can interact with Chrome.</p>

  <div>
    <button id="btn-hello" onclick="showMessage('Hello from Chrome!')">Say Hello</button>
    <button id="btn-time" onclick="showTime()">Show Time</button>
    <button id="btn-error" onclick="triggerError()">Trigger Console Error</button>
  </div>

  <div id="output">Click a button to see output here.</div>

  <script>
    function showMessage(msg) {
      document.getElementById('output').innerHTML = '<span class="success">' + msg + '</span>';
      console.log('Button clicked:', msg);
    }

    function showTime() {
      const time = new Date().toLocaleTimeString();
      document.getElementById('output').innerHTML = '<span class="success">Current time: ' + time + '</span>';
      console.log('Time displayed:', time);
    }

    function triggerError() {
      console.error('Test error triggered by user');
      document.getElementById('output').innerHTML = '<span class="error">Error logged to console!</span>';
    }
  </script>
</body>
</html>
