name: Upstash Integration

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: upstash-integration-${{ github.ref }}
  cancel-in-progress: true

jobs:
  upstash:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
      UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
      RATE_LIMIT_ENABLE_IN_TEST: "1"
      NEXT_PUBLIC_SUPABASE_URL: http://localhost:54321
      NEXT_PUBLIC_SUPABASE_ANON_KEY: anon
      SUPABASE_SERVICE_ROLE_KEY: service
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/postgres?schema=public
      DIRECT_URL: postgresql://postgres:postgres@localhost:5432/postgres?schema=public
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Validate Upstash secrets
        shell: bash
        run: |
          set -euo pipefail
          missing=()
          for key in UPSTASH_REDIS_REST_URL UPSTASH_REDIS_REST_TOKEN; do
            if [ -z "${!key:-}" ]; then
              missing+=("$key")
            fi
          done
          if [ ${#missing[@]} -gt 0 ]; then
            echo "::error title=Missing GitHub Actions Secrets::Missing: ${missing[*]}"
            exit 1
          fi

      - run: npm run test:upstash

